<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Evening Study Planner</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="plannerHeader">

        <button
            class="backBtn"
            onclick="location.href='index.html'">

            ← Back

        </button>

        <h1>

            🌙 EVENING STUDY PLANNER

        </h1>

        <button id="themeBtn">

            🌙 Dark Mode

        </button>

    </header>

    <div class="dashboard">

        <div class="completedBox">

            <h2 id="completedDays">

                0 / 162

            </h2>

            <p>

                Completed Days

            </p>

        </div>

        <div class="streakBox">

            <h2 id="streak">

                0

            </h2>

            <p>

                Study Streak

            </p>

        </div>

    </div>

    <div class="tableContainer">

        <table>

            <thead>

                <tr>

                    <th>Date</th>

                    <th>Day</th>

                    <th>Today's Plan</th>

                    <th>Hours</th>

                    <th>Completed</th>

                    <th>Result</th>

                </tr>

            </thead>

            <tbody id="plannerBody">

            </tbody>

        </table>

    </div>

    <footer>

        🌟 ALL THE BEST 🌟

    </footer>

    <script src="evening.js"></script>

</body>

</html>
