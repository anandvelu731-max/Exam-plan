<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TNPSC Study Planner</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="topHeader">

        <button id="themeBtn">
            🌙 Dark Mode
        </button>

        <h1>
            📚 TNPSC STUDY PLANNER
        </h1>

    </header>

    <section class="home">

        <h2>
            Choose Your Planner
        </h2>

        <p>
            Plan your study smartly and achieve your goals.
        </p>

        <div class="cardContainer">

            <!-- Morning -->

            <div class="card" onclick="location.href='morning.html'">

                <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">

                <h2>Morning</h2>

                <p>
                    Plan your morning study
                    <br>
                    and boost productivity.
                </p>

                <button>
                    Open Morning Planner →
                </button>

            </div>

            <!-- Evening -->

            <div class="card" onclick="location.href='evening.html'">

                <img src="https://cdn-icons-png.flaticon.com/512/979/979585.png">

                <h2>Evening</h2>

                <p>
                    Plan your evening study
                    <br>
                    and stay consistent.
                </p>

                <button>
                    Open Evening Planner →
                </button>

            </div>

        </div>

    </section>

    <script src="home.js"></script>

</body>

</html>
