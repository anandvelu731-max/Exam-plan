<!DOCTYPE html>
<html>

<head>

<title>TNPSC Study Planner</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="homeHeader">


<button id="themeBtn">
🌙 Dark Mode
</button>


<h1>
📚 TNPSC STUDY PLANNER
</h1>


</header>





<section class="home">


<h2>
Choose Your Planner
</h2>


<p>
Plan your study smartly and achieve your goals.
</p>





<div class="cardContainer">



<div class="card">


<img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">


<h2>
Morning
</h2>


<p>
Plan your morning study
<br>
and boost productivity.
</p>



<button onclick="openMorning()">
Open Morning Planner →
</button>


</div>





<div class="card">


<img src="https://cdn-icons-png.flaticon.com/512/979/979585.png">


<h2>
Evening
</h2>


<p>
Plan your evening study
<br>
and stay consistent.
</p>



<button onclick="openEvening()">
Open Evening Planner →
</button>


</div>




</div>


</section>





<script>


function openMorning()
{
window.location.href="morning.html";
}


function openEvening()
{
window.location.href="evening.html";
}



const themeBtn=document.getElementById("themeBtn");


themeBtn.onclick=function()
{

document.body.classList.toggle("dark");


if(document.body.classList.contains("dark"))
{

localStorage.setItem("theme","dark");

themeBtn.innerHTML="☀️ Light Mode";

}

else
{

localStorage.setItem("theme","light");

themeBtn.innerHTML="🌙 Dark Mode";

}

};



if(localStorage.getItem("theme")=="dark")
{

document.body.classList.add("dark");

themeBtn.innerHTML="☀️ Light Mode";

}


</script>



</body>

</html>
