<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Morning Study Planner</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

    <button class="backBtn"
            onclick="window.location.href='index.html'">

        ← Back

    </button>

    <h1>🌅 MORNING STUDY PLANNER</h1>

    <button id="themeBtn">

        🌙 Dark Mode

    </button>

</header>

<div class="topBoxes">

    <div class="box">

        <h2 id="completedDays">0 / 162</h2>

        <p>Completed Days</p>

    </div>

    <div class="box">

        <h2 id="streak">0</h2>

        <p>Study Streak</p>

    </div>

</div>

<div class="tableDiv">

<table>

<thead>

<tr>

<th>Date</th>

<th>Day</th>

<th>Today's Plan</th>

<th>Hours</th>

<th>Completed</th>

<th>Result</th>

</tr>

</thead>

<tbody id="plannerBody">

</tbody>

</table>

</div>

<footer>

🌟 ALL THE BEST 🌟

</footer>

</div>

<script src="morning.js"></script>

</body>

</html>
