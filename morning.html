<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Morning Study Planner</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->

    <header class="plannerHeader">

        <button onclick="location.href='index.html'" class="backBtn">
            ← Back
        </button>

        <h1>🌅 MORNING STUDY PLANNER</h1>

        <button id="themeBtn">
            🌙 Dark Mode
        </button>

    </header>

    <!-- Dashboard -->

    <div class="dashboard">

        <div class="completedBox">

            <h2 id="completedDays">0 / 162</h2>

            <p>Completed Days</p>

        </div>

        <div class="streakBox">

            <h2 id="streak">0</h2>

            <p>Study Streak</p>

        </div>

    </div>

    <!-- Table -->

    <div class="tableContainer">

        <table>

            <thead>

                <tr>

                    <th>Date</th>

                    <th>Day</th>

                    <th>Today's Plan</th>

                    <th>Hours</th>

                    <th>Completed</th>

                    <th>Result</th>

                </tr>

            </thead>

            <tbody id="plannerBody">

                <!-- JavaScript creates rows -->

            </tbody>

        </table>

    </div>

    <footer>

        🌟 ALL THE BEST 🌟

    </footer>

    <script src="morning.js"></script>

</body>

</html>
